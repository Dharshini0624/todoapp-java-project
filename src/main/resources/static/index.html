<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>My Todo List</h1>

    <p id="taskCount"></p>
    <p id="remainingCount"></p>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add Task</button>
    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
